template:
  package: tidytemplate
  bootstrap: 5

development:
  mode: auto

reference:
- title: Reports
  desc: Functions for getting full reports
- contents:
  - starts_with("getReport") 

- title: Reporting Functions
  desc: These generate a report for a related set of variables
- contents:
  - starts_with("report")

- title: Spatial Aggregating and Conversion
  desc: Functions for spatial data handling, aggregation, and conversion
- contents:
  - has_concept("Spatial")

- title: Reporting Infrastructure
  desc: Functions for writing new reports
- contents:
  - has_concept("Infrastructure")

- title: Validation PDF
  desc: Functions for generating a validation PDF
- contents:
  - has_concept("ValidationPDF")

- title: Data Changelog
  desc: Functions for tracking data changes across runs
- contents:
  - has_concept("Data Changelog")

- title: Utilities
  desc: Miscellaneous utility functions
- contents:
  - submitCalibration
  - checkLibrary
  - clearCacheMagpie4
  - deco

- title: Variable Functions 
  desc: Calculate reporting variables
- contents:
  - matches(".*") 
  - -starts_with("getReport") 
  - -starts_with("report") 
  - -has_concept("Spatial") 
  - -has_concept("Infrastructure") 
  - -has_concept("ValidationPDF")
  - -has_concept("Data Changelog")
  - -checkLibrary
  - -clearCacheMagpie4
  - -deco
  - -submitCalibration

